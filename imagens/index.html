<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus sites favoritos</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            /* Fundo com esfumado do roxo para branco até metade da tela */
            background: linear-gradient(to bottom, #a855f7 0%, #d8b4fe 25%, #ffffff 50%, #ffffff 100%);
            text-align: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        h1 {
            color: #5b21b6;
            background-color: rgba(255, 255, 255, 0.85);
            display: inline-block;
            padding: 15px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 12px rgba(128, 0, 128, 0.25);
            border: 2px solid #c084fc;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .site {
            background-color: white;
            border-radius: 15px;
            padding: 20px;
            width: 220px;
            box-shadow: 0 6px 15px rgba(128, 0, 128, 0.15);
            border: 2px solid #d8b4fe;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .site:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(128, 0, 128, 0.25);
        }

        .site h2 {
            color: #7e22ce;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .site img {
            width: 200px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            margin: 10px 0;
            border: 2px solid #e9d5ff;
        }

        .site a {
            display: block;
            margin-top: 10px;
            color: #6b21a8;
            text-decoration: none;
            font-weight: bold;
        }

        .site a:hover {
            color: #9333ea;
            text-decoration: underline;
        }
    </style>
</head>
<body>



    <!-- Título principal da página -->
    <h1>Meus sites favoritos: Cauã Reis</h1>

    <div class="container">

        <!-- Pinterest -->
        <div class="site">
            <h2>Pinterest</h2>
            <a href="https://www.pinterest.com" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Pinterest-logo.png" alt="Pinterest">
            </a>
            <a href="https://www.pinterest.com" target="_blank">https://www.pinterest.com</a>
        </div>

        <!-- YouTube -->
        <div class="site">
            <h2>YouTube</h2>
            <a href="https://www.youtube.com" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" alt="YouTube">
            </a>
            <a href="https://www.youtube.com" target="_blank">https://www.youtube.com</a>
        </div>

        <!-- X (Twitter) -->
        <div class="site">
            <h2>Twitter (X)</h2>
            <a href="https://x.com" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/57/X_logo_2023_%28white%29.png" alt="Twitter X">
            </a>
            <a href="https://x.com" target="_blank">https://x.com</a>
        </div>

        <!-- Canva -->
        <div class="site">
            <h2>Canva</h2>
            <a href="https://www.canva.com" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Canva_icon_2021.svg" alt="Canva">
            </a>
            <a href="https://www.canva.com" target="_blank">https://www.canva.com</a>
        </div>

            <!-- Twitch -->
        <div class="site">
            <h2>Twitch</h2>
            <a href="https://www.twitch.tv" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c6/Twitch_logo_2019.svg" alt="Twitch">
            </a>
            <a href="https://www.twitch.tv" target="_blank">https://www.twitch.tv</a>
        </div>

    </div>

</body>
</html>
